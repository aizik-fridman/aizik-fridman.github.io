<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itzik Friedman — Portfolio</title>
    <meta name="description" content="Personal portfolio of Itzik Friedman" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Tailwind Play CDN for quick styling without a build step -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React + ReactDOM (development builds) and Babel for in-browser JSX transpile -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      /* simple small tweak for body background while Tailwind loads */
      html,body,#root{height:100%;}
    </style>
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-200 font-sans selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <!-- App (JSX) compiled in the browser for quick deploy without a build step -->
    <script type="text/babel">
      const { useState, useEffect } = React;

      /* small inline icon components to replace lucide-react imports */
      const IconBase = ({ children, size = 20, className = '', title = '' }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={title}>
          {children}
        </svg>
      );

      const Linkedin = (props) => (
        <IconBase {...props}>
          <rect x="2" y="2" width="20" height="20" rx="2" ry="2" />
          <path d="M6 9v8" />
          <path d="M10 9v8" />
          <path d="M10 9a2 2 0 1 1 4 0v8" />
        </IconBase>
      );
      const Mail = (props) => (
        <IconBase {...props}>
          <path d="M3 8l9 6 9-6" />
          <path d="M21 8v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8" />
        </IconBase>
      );
      const ExternalLink = (props) => (
        <IconBase {...props}>
          <path d="M18 13v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          <path d="M15 3h6v6" />
          <path d="M10 14L21 3" />
        </IconBase>
      );
      const Code2 = (props) => (
        <IconBase {...props}>
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </IconBase>
      );
      const Terminal = (props) => (
        <IconBase {...props}>
          <polyline points="3 7 8 12 3 17" />
          <line x1="10" y1="17" x2="21" y2="17" />
        </IconBase>
      );
      const Briefcase = (props) => (
        <IconBase {...props}>
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
          <path d="M16 7V5a2 2 0 0 0-2-2H10a2 2 0 0 0-2 2v2" />
        </IconBase>
      );
      const ChevronDown = (props) => (
        <IconBase {...props}>
          <polyline points="6 9 12 15 18 9" />
        </IconBase>
      );

      // ==========================================
      // אזור הגדרות המידע - ערוך את הנתונים כאן!
      // ==========================================
      const portfolioData = {
        personal: {
          name: "Itzik Friedman",
          title: "Engineer & Monitoring Tools Developer",
          shortBio: "I build robust backend systems, develop advanced monitoring solutions, and automate complex web workflows.",
          longBio: "Hello! I am an Engineer specializing in monitoring tools, backend development, and web automation. With a strong foundation in networking and data extraction, I build scalable APIs, set up comprehensive observability stacks using Grafana and Prometheus, and develop robust automation scripts using Python, Selenium, and Playwright.",
          email: "aizik138@gmail.com",
          github: "https://github.com/aizik-friedman",
          linkedin: "https://linkedin.com/in/aizik138"
        },
        skills: [
          { name: "Python", level: 95 },
          { name: "Grafana & Prometheus", level: 90 },
          { name: "Backend Development & APIs", level: 85 },
          { name: "Web Scraping (Selenium, Playwright)", level: 90 },
          { name: "PostgreSQL", level: 85 },
          { name: "Networking", level: 80 }
        ],
        projects: [
          {
            id: 1,
            title: "Enterprise Monitoring Stack",
            description: "Deployed a comprehensive monitoring solution using Prometheus and Grafana to track system metrics, network traffic, and application health in real-time.",
            tags: ["Prometheus", "Grafana", "Linux", "Networking"],
            image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
            link: "#",
            github: "#"
          },
          {
            id: 2,
            title: "Automated Data Extraction Pipeline",
            description: "Built an advanced web scraper capable of bypassing complex anti-bot systems to aggregate market data daily.",
            tags: ["Python", "Playwright", "Selenium", "PostgreSQL"],
            image: "https://images.unsplash.com/photo-1555949963-aa79dcee981c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
            link: "#",
            github: "#"
          },
          {
            id: 3,
            title: "High-Performance REST API",
            description: "Developed a scalable backend service handling thousands of concurrent requests, heavily optimized with database indexing.",
            tags: ["Python", "FastAPI", "PostgreSQL", "Docker"],
            image: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
            link: "#",
            github: "#"
          }
        ]
      };

      // ==========================================
      // קוד האפליקציה
      // ==========================================

      function App() {
        const [activeSection, setActiveSection] = useState('home');
        const [isScrolled, setIsScrolled] = useState(false);

        useEffect(() => {
          const handleScroll = () => {
            setIsScrolled(window.scrollY > 50);

            const sections = ['home', 'about', 'skills', 'projects', 'contact'];
            for (const section of sections) {
              const element = document.getElementById(section);
              if (element) {
                const rect = element.getBoundingClientRect();
                if (rect.top <= 100 && rect.bottom >= 100) {
                  setActiveSection(section);
                  break;
                }
              }
            }
          };

          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        const scrollTo = (id) => {
          const element = document.getElementById(id);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth' });
          }
        };

        return (
          <div className="min-h-screen bg-slate-900 text-slate-200 font-sans selection:bg-indigo-500 selection:text-white">

            {/* Navigation */}
            <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-slate-900/90 backdrop-blur-md shadow-lg py-3' : 'bg-transparent py-5'}`}></nav>

            {/* Hero Section */}
            <section id="home" className="min-h-screen flex items-center justify-center relative pt-20"></section>

            {/* About Section */}
            <section id="about" className="py-24 bg-slate-800/50"></section>

            {/* Skills Section */}
            <section id="skills" className="py-24"></section>

            {/* Projects Section */}
            <section id="projects" className="py-24 bg-slate-800/50"></section>

            {/* Contact Section */}
            <section id="contact" className="py-32"></section>

            {/* Footer */}
            <footer className="py-8 bg-slate-950 text-center border-t border-slate-800"></footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
